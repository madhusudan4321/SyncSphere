<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SyncSphere</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app-shell">

  <!-- LOGIN -->
  <div id="screen-login" class="screen active">
    <div class="auth-wrap">
      <div class="auth-box">
        <div class="auth-logo"><div class="auth-logo-text">SyncSphere</div></div>
        <div class="auth-card">
          <p class="auth-desc">Sign in to see photos from your friends.</p>
          <input type="email" id="login-email" placeholder="Email">
          <input type="password" id="login-pass" placeholder="Password">
          <p class="auth-error" id="login-err"></p>
          <button class="btn-main" onclick="authLogin()">Log In</button>
        </div>
        <div class="auth-switch">Don't have an account? <span onclick="switchScreen('signup')">Sign up</span></div>
      </div>
    </div>
  </div>

  <!-- SIGNUP -->
  <div id="screen-signup" class="screen">
    <div class="auth-wrap">
      <div class="auth-box">
        <div class="auth-logo"><div class="auth-logo-text">SyncSphere</div></div>
        <div class="auth-card">
          <p class="auth-desc">Sign up to see photos from your friends.</p>
          <input type="text" id="reg-username" placeholder="Username">
          <input type="email" id="reg-email" placeholder="Email">
          <input type="password" id="reg-pass" placeholder="Password (min 6 chars)">
          <input type="password" id="reg-pass2" placeholder="Confirm Password">
          <p class="auth-error" id="reg-err"></p>
          <button class="btn-main" onclick="authRegister()">Sign Up</button>
        </div>
        <div class="auth-switch">Have an account? <span onclick="switchScreen('login')">Log in</span></div>
      </div>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="screen-app" class="screen">
    <div class="app-wrap">
      <div class="top-nav">
        <div class="logo">SyncSphere</div>
        <div class="nav-icons">
          <svg onclick="openUpload()" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
          <svg onclick="authLogout()" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        </div>
      </div>

      <div class="content-area">
        <div id="tab-home"    class="tab-panel active"><div class="feed-container"><div class="stories-row" id="stories-row"></div><div id="feed-posts"></div></div></div>
        <div id="tab-search"  class="tab-panel">
          <div class="search-container"><div class="search-bar"><svg width="16" height="16" fill="none" stroke="var(--muted)" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg><input type="text" id="search-input" placeholder="Search users..." oninput="searchUsers(this.value)"></div></div>
          <div id="search-results"><div class="search-placeholder"><p>Search for users by username</p></div></div>
        </div>
        <div id="tab-chat"    class="tab-panel">
          <div style="height:100%;display:flex;flex-direction:column">
            <div class="chat-list-view" id="chat-list-view">
              <div class="chat-list-header">
                <h2 id="chat-title">Messages</h2>
                <svg onclick="toggleNewChat()" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" style="cursor:pointer"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="10" y1="11" x2="14" y2="11"/></svg>
              </div>
              <div class="new-chat-search" id="new-chat-search" style="display:none">
                <input type="text" id="new-chat-input" placeholder="Search to start chat..." oninput="searchNewChat(this.value)">
                <div id="new-chat-results"></div>
              </div>
              <div id="chat-threads"></div>
            </div>
            <div class="chat-window-panel" id="chat-window">
              <div class="chat-win-header">
                <button class="back-btn" onclick="closeChatWindow()"><svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="15,18 9,12 15,6"/></svg></button>
                <div class="cw-av"><div class="cw-av-inner" id="cw-av"></div></div>
                <div class="cw-name" id="cw-name"></div>
              </div>
              <div class="chat-messages" id="chat-messages"></div>
              <div class="chat-input-row">
                <input type="text" id="chat-msg-input" placeholder="Message..." onkeydown="if(event.key==='Enter')sendMessage()">
                <button class="send-btn" onclick="sendMessage()"><svg width="16" height="16" fill="none" stroke="#fff" stroke-width="2" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22,2 15,22 11,13 2,9"/></svg></button>
              </div>
            </div>
          </div>
        </div>
        <div id="tab-profile" class="tab-panel"><div id="profile-view"></div></div>
      </div>

      <div class="bottom-nav">
        <div class="nav-item active" id="nav-home"    onclick="switchTab('home')"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg></div>
        <div class="nav-item" id="nav-search"  onclick="switchTab('search')"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg></div>
        <div class="nav-item" id="nav-chat"    onclick="switchTab('chat')"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg></div>
        <div class="nav-item" id="nav-profile" onclick="switchTab('profile')"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
      </div>
    </div>
  </div>
</div>

<!-- UPLOAD MODAL -->
<div class="modal-overlay" id="upload-modal">
  <div class="modal-box">
    <div class="modal-header"><h3>New Post</h3><button class="close-btn" onclick="closeUpload()">×</button></div>
    <div class="upload-area">
      <img id="upload-preview" src="" alt="" style="display:none;width:100%;height:220px;object-fit:cover;border-radius:8px;margin-bottom:12px">
      <div class="upload-drop" id="upload-drop">
        <input type="file" accept="image/*" onchange="previewImage(this)">
        <div style="font-size:48px;margin-bottom:10px">📷</div>
        <p style="font-weight:600">Drag photo here</p>
        <p style="color:var(--muted);margin-top:4px">or click to browse</p>
      </div>
      <textarea id="upload-caption" placeholder="Write a caption..."></textarea>
      <button class="btn-post" onclick="submitPost()">Share Post</button>
    </div>
  </div>
</div>

<!-- EDIT PROFILE MODAL -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal-box">
    <div class="modal-header"><h3>Edit Profile</h3><button class="close-btn" onclick="closeEdit()">×</button></div>
    <div class="edit-form">
      <label>Name</label><input type="text" id="edit-name">
      <label>Username</label><input type="text" id="edit-uname" readonly style="opacity:.6;cursor:not-allowed">
      <label>Bio</label><textarea id="edit-bio"></textarea>
      <label>Website</label><input type="text" id="edit-website">
      <button class="btn-save" onclick="saveProfile()">Save Changes</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/feed.js"></script>
<script src="js/search.js"></script>
<script src="js/chat.js"></script>
<script src="js/profile.js"></script>
</body>
</html>
